<h2>Categorías</h2>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>

      <th>Nombre</th>

      <th>Descripción</th>

    </tr>

  </thead>

  <tbody>

    <tr
      *ngFor="let category of categories">

      <td>{{ category.id }}</td>

      <td>{{ category.name }}</td>

      <td>{{ category.description }}</td>

    </tr>

  </tbody>

</table>
