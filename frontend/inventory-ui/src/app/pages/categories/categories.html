<h2>Categorías</h2>

<button
  routerLink="/categorias/nuevo">

  Nueva Categoría

</button>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>

      <th>Nombre</th>

      <th>Descripción</th>

      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr
      *ngFor="let category of categories">

      <td>{{ category.id }}</td>

      <td>{{ category.name }}</td>

      <td>{{ category.description }}</td>

      <td>

        <button
          [routerLink]="[
            '/categorias/editar',
            category.id
          ]">

          Editar

        </button>

        <button
          (click)="deleteCategory(category.id!)">

          Eliminar

        </button>

      </td>

    </tr>

  </tbody>

</table>
