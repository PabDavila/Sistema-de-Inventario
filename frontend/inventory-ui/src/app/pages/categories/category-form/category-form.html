<h2>

  {{ categoryId ? 'Editar Categoría' : 'Nueva Categoría' }}

</h2>

<form
  [formGroup]="form"
  (ngSubmit)="save()">

  <input
    formControlName="name"
    placeholder="Nombre" id="">

  <input
    formControlName="description"
    placeholder="Descripción" id="">

  <button type="submit">

    Guardar

  </button>

</form>
