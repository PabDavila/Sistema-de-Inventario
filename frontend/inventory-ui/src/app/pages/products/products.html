<h2>Productos</h2>

<button routerLink="/productos/nuevo">
  Nuevo Producto
</button>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>
      <th>Nombre</th>
      <th>Descripción</th>
      <th>Stock</th>
      <th>Precio</th>
      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr *ngFor="let product of products">

      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.description }}</td>
      <td>{{ product.stock }}</td>
      <td>{{ product.price }}</td>

      <td>

        <button [routerLink]="[
      '/productos/editar',
      product.id
    ]">

          Editar

        </button>

        <button (click)="deleteProduct(product.id!)">

          Eliminar

        </button>

      </td>

    </tr>

  </tbody>

</table>
