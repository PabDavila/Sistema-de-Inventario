<h2>Movimientos</h2>

<button routerLink="/movimientos/nuevo">

  Nuevo Movimiento

</button>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>

      <th>Producto</th>

      <th>Tipo</th>

      <th>Cantidad</th>

      <th>Estado</th>

      <th>Fecha</th>

      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr *ngFor="let movement of movements">

      <td>{{ movement.id }}</td>

      <td>{{ movement.productName }}</td>

      <td>{{ movement.type }}</td>

      <td>{{ movement.quantity }}</td>

      <td>{{ movement.status }}</td>

      <td>{{ movement.movementDate }}</td>

      <td>

        <button [routerLink]="[
      '/movimientos/editar',
      movement.id
    ]">

          Editar

        </button>

      </td>

    </tr>

  </tbody>

</table>
