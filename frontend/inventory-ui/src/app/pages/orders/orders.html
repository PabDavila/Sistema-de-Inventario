<h2>Pedidos</h2>

<a routerLink="/pedidos/nuevo">

  Nuevo Pedido

</a>

<br>
<br>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>

      <th>Cliente</th>

      <th>Dirección</th>

      <th>Estado</th>

      <th>Observación</th>

      <th>Fecha</th>

      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr *ngFor="let order of orders">

      <td>

        {{ order.id }}

      </td>

      <td>

        {{ order.clientName }}

      </td>

      <td>

        {{ order.clientAddress }}

      </td>

      <td>

        {{ order.status }}

      </td>

      <td>

        {{ order.observation }}

      </td>

      <td>

        {{ order.orderDate }}

      </td>

      <td>

        <button [routerLink]="[
    '/pedidos/editar',
    order.id
  ]">

          Modificar

        </button>
        <button [routerLink]="[
    '/pedidos',
    order.id
  ]">

          Ver

        </button>
      </td>

    </tr>

  </tbody>

</table>
