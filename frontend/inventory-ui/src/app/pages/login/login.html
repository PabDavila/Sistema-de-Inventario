<h2>Iniciar Sesión</h2>

<form (ngSubmit)="login()">

  <div>
    <label>Usuario</label>
    <input
      type="text"
      name="username"
      [(ngModel)]="username">
  </div>

  <br>

  <div>
    <label>Contraseña</label>
    <input
      type="password"
      name="password"
      [(ngModel)]="password">
  </div>

  <br>

  <button type="submit">
    Ingresar
  </button>

</form>
