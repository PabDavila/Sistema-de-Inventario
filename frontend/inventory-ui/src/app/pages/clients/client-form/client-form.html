<form [formGroup]="form" (ngSubmit)="save()">

  <h2>
    {{ isEditMode ? 'Editar Cliente' : 'Nuevo Cliente' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="save()">

    <input formControlName="name" placeholder="Nombre" id="">

    <input formControlName="email" placeholder="Email" id>

    <input formControlName="phone" placeholder="Teléfono" id>

    <input type="text" formControlName="address" name="address" placeholder="Dirección" id="">

    <button type="submit">

      {{ isEditMode ? 'Actualizar' : 'Guardar' }}

    </button>

  </form>

</form>
