<h2>Clients</h2>

<a routerLink="/clients/new">
  New Client
</a>

<table>

  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let client of clients">

      <td>{{ client.name }}</td>

      <td>{{ client.email }}</td>

      <td>{{ client.phone }}</td>

      <td>

        <a
          [routerLink]="[
            '/clients/edit',
            client.id
          ]">

          Edit

        </a>

        <button
          (click)="deleteClient(client.id!)">

          Delete

        </button>

      </td>

    </tr>

  </tbody>

</table>
