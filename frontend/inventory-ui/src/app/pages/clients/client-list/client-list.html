<h2>Clients</h2>

<a routerLink="/clients/nuevo">
  Nuevo Cliente
</a>

<table>

  <thead>
    <tr>
      <th>Nombre</th>
      <th>Email</th>
      <th>Telefono</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let client of clients">

      <td>{{ client.name }}</td>

      <td>{{ client.email }}</td>

      <td>{{ client.phone }}</td>

      <td>

        <button [routerLink]="['/clientes/editar', client.id]">
          Editar
        </button>

        <button (click)="deleteClient(client.id!)">

          Borrar

        </button>

      </td>

    </tr>

  </tbody>

</table>
