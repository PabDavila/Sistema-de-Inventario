<h2>Administración de Usuarios</h2>

<form (ngSubmit)="createUser()">

  <div>

    <label>Usuario</label>

    <input
      type="text"
      name="username"
      [(ngModel)]="username" id="">

  </div>

  <br>

  <div>

    <label>Contraseña</label>

    <input
      type="password"
      name="password"
      [(ngModel)]="password" id="">

  </div>

  <br>

  <div>

    <label>Rol</label>

    <select
      name="role"
      [(ngModel)]="role" id="">

      <option value="ROLE_OPERATOR">
        Operador
      </option>

      <option value="ROLE_DELIVERY">
        Repartidor
      </option>

      <option value="ROLE_ADMIN">
        Administrador
      </option>

    </select>

  </div>

  <br>

  <button type="submit">

    Crear Usuario

  </button>

</form>

<hr>

<h3>Usuarios Registrados</h3>

<table border="1">

  <thead>

    <tr>

      <th>ID</th>

      <th>Usuario</th>

      <th>Rol</th>

      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr
      *ngFor="let user of users">

      <td>{{ user.id }}</td>

      <td>{{ user.username }}</td>

      <td>{{ user.role }}</td>

      <td>

        <button
          (click)="deleteUser(user.id!)">

          Eliminar

        </button>

      </td>

    </tr>

  </tbody>

</table>
