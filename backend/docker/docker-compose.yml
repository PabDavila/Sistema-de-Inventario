services:

  postgres:
    image: postgres:17
    container_name: inventory-postgres

    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ../auth-service

    container_name: auth-service

    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/inventorydb
      DB_USER: postgres
      DB_PASSWORD: postgres

    ports:
      - "8081:8081"

    depends_on:
      - postgres

  inventory-service:
    build:
      context: ../inventory-service

    container_name: inventory-service

    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/inventorydb
      DB_USER: postgres
      DB_PASSWORD: postgres

    ports:
      - "8082:8082"

    depends_on:
      - postgres

  bff-gateway:
    build:
      context: ../bff-gateway

    container_name: bff-gateway

    ports:
      - "8080:8080"

    depends_on:
      - auth-service
      - inventory-service

volumes:
  postgres_data: